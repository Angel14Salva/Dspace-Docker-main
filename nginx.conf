# Nginx Reverse Proxy para DSpace
# Universidad - Repositorio Institucional

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # ========== UPSTREAM BACKENDS ==========
    upstream dspace_backend {
        server dspace:8080;
    }

    upstream dspace_frontend {
        server dspace-angular:80;
        keepalive 32;
    }

    # Increase timeout for Angular dev server
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;

    # ========== SERVIDOR HTTP ==========
    server {
        listen 80;
        server_name _;

        # Redirigir a HTTPS si SSL está habilitado
        # return 301 https://$server_name$request_uri;

        # ========== API REST ==========
        location /server/ {
            proxy_pass http://dspace_backend/server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffer
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # ========== OAI-PMH (PARA ALICIA) ==========
        location /oai {
            proxy_pass http://dspace_backend/server/oai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========== FRONTEND ANGULAR ==========
        location / {
            proxy_pass http://dspace_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ========== STATIC FILES (ASSETS) - Angular Frontend ==========
        # These MUST come BEFORE the generic /assets/ location
        # Angular error pages (500, etc) load assets from /assets/images/, /assets/fonts/
        location /assets/i18n/ {
            proxy_pass http://dspace_frontend/assets/i18n/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, immutable";
        }

        location /assets/config.json {
            proxy_pass http://dspace_frontend/assets/config.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Serve Angular's own assets (images, fonts, favicons) from frontend
        location ~ ^/assets/(images|fonts|dspace)/ {
            proxy_pass http://dspace_frontend$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, immutable";
        }

        # ========== DSpace Backend Assets (bitstreams) ==========
        location /bitstreams/ {
            proxy_pass http://dspace_backend/server/bitstreams/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
        }
    }
}
