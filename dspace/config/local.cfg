# =============================================================================
# DSpace Production Local Configuration
# =============================================================================
# This file overrides default configurations for production deployment
# =============================================================================

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================

# DSpace installation directory
dspace.dir = /dspace

# Public URL of DSpace backend (REST API)
# IMPORTANT: Replace 'your-domain.com' with your actual domain or droplet IP
dspace.server.url = http://${DSPACE_HOST:-localhost}:8080/server

# Public URL of DSpace frontend (Angular UI)
# IMPORTANT: Replace 'your-domain.com' with your actual domain or droplet IP
dspace.ui.url = http://${DSPACE_HOST:-localhost}:${DSPACE_UI_PORT:-4000}

# DSpace instance name
dspace.name = ${DSPACE_NAME:-ALICIA - DSpace}

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================

# Database connection is managed via environment variables
# db.url = jdbc:postgresql://dspacedb:5432/dspace
# db.username = dspace
# db.password = dspace

# =============================================================================
# SOLR CONFIGURATION
# =============================================================================

# Solr server (using Docker service name)
solr.server = http://dspacesolr:8983/solr

# =============================================================================
# EMAIL CONFIGURATION (Configure via environment variables)
# =============================================================================

# SMTP mail server
# mail.server = ${SMTP_HOST:-smtp.example.com}
# mail.server.port = ${SMTP_PORT:-587}
# mail.from.address = noreply@${DSPACE_HOST:-localhost}
# mail.admin = ${ADMIN_EMAIL:-admin@localhost}

# =============================================================================
# FILE UPLOAD CONFIGURATION
# =============================================================================

# Maximum size of a single uploaded file (2GB)
spring.servlet.multipart.max-file-size = 2048MB

# Maximum size of a multipart request (2GB)
spring.servlet.multipart.max-request-size = 2048MB

# =============================================================================
# REST API SETTINGS
# =============================================================================

# Allow CORS for frontend (replace with your actual frontend URL in production)
# For production, set this to your actual domain: https://alicia.your-domain.com
rest.cors.allowed-origins = ${dspace.ui.url}

# =============================================================================
# OAI-PMH CONFIGURATION (For ALICIA interoperability)
# =============================================================================

# OAI-PMH enabled
oai.enabled = true

# OAI Solr URL
oai.solr.url = http://dspacesolr:8983/solr/oai

# Include bitstreams in OAI-PMH responses (for full metadata harvesting)
oai.includebitstreams = true

# =============================================================================
# HARVESTING CONFIGURATION
# =============================================================================

# Enable harvesting
harvest.enabled = true

# Default harvest type (OAI-PMH)
harvest.type = oai

# =============================================================================
# HANDLE CONFIGURATION
# =============================================================================

# Handle prefix (register with handle.net for production use)
# For testing, use the default: 123456789
handle.prefix = 123456789

# Canonical Handle URL prefix
# Uncomment and customize after registering with handle.net
# handle.canonical.prefix = https://hdl.handle.net/

# =============================================================================
# AUTHENTICATION SETTINGS
# =============================================================================

# Enable password authentication by default
plugin.sequence.org.dspace.authenticate.AuthenticationMethod = org.dspace.authenticate.PasswordAuthentication

# =============================================================================
# CORS SETTINGS
# =============================================================================

# Allow CORS for Angular frontend
cors.allowed.origins = ${dspace.ui.url}

# =============================================================================
# PROXY SETTINGS (If needed)
# =============================================================================

# http.proxy.host = your-proxy-host
# http.proxy.port = 8080

# =============================================================================
# LDN (Linked Data Notifications) SETTINGS
# =============================================================================

# Enable LDN for interoperability
ldn.enabled = true

# =============================================================================
# STATISTICS SETTINGS
# =============================================================================

# Solr URL for statistics
solr.statistics.server = http://dspacesolr:8983/solr/statistics

# =============================================================================
# IIIF SETTINGS (If using IIIF for image viewing)
# =============================================================================

# Enable IIIF
iiif.enabled = true

# IIIF Solr URL
iiif.solr = http://dspacesolr:8983/solr/search

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================

# Production logging level (reduce noise in logs)
log4j.rootLogger = INFO, CONSOLE

# Reduce logging for verbose modules
log4j.logger.org.dspace = INFO
log4j.logger.org.hibernate = WARN
log4j.logger.org.springframework = WARN
